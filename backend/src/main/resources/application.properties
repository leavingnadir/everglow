spring.application.name=backend

# Server
server.port=8081

# Neon PostgreSQL Database
spring.datasource.url=jdbc:postgresql://ep-rough-frog-aoorv8b6-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?user=neondb_owner&password=npg_UJ6nYNoerBT0&sslmode=require&channelBinding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_UJ6nYNoerBT0
spring.datasource.driver-class-name=org.postgresql.Driver

#JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Change to "validate" or "none" in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson (JSON serialization)
# Sends dates as "2025-01-01" strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# Connection Pool (fixes Neon idle connection drops)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=30000